name: Build Windows AppX

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Dependencies
      working-directory: "منصة-الأستاذ-ديهم(2)"
      run: npm install

    - name: Build Vite and Electron
      working-directory: "منصة-الأستاذ-ديهم(2)"
      run: npm run electron:build

    - name: Build AppX
      working-directory: "منصة-الأستاذ-ديهم(2)"
      run: npm run dist
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload AppX Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-AppX-Packages
        path: "منصة-الأستاذ-ديهم(2)/release/*.appx*"
